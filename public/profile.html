<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Личный кабинет | VitaEquip</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#071425;color:#fff}.header{height:86px;border-bottom:1px solid #20344f;display:flex;align-items:center;justify-content:space-between;padding:0 7%;background:#071425}.logo{font-size:26px;font-weight:800}.logo span{color:#49a7ff}.nav a,.nav button{color:#c8d4e3;text-decoration:none;margin-left:18px;font-weight:700;background:none;border:0;font-size:16px;cursor:pointer}.nav .btn{background:#2f86ff;color:#fff;padding:14px 22px;border-radius:12px}.wrap{max-width:1200px;margin:0 auto;padding:42px 18px}.grid{display:grid;grid-template-columns:360px 1fr;gap:24px}.card{background:#0d1d31;border:1px solid #203a5a;border-radius:22px;padding:26px;box-shadow:0 12px 40px #0004}h1{margin:0 0 24px;font-size:38px}.avatar{width:72px;height:72px;border-radius:18px;background:#143b68;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:18px}.row{margin:16px 0}.label{color:#8fa4bd;font-size:14px;margin-bottom:5px}.value{font-size:17px;font-weight:700}.orders{display:grid;gap:14px}.order{border:1px solid #254866;background:#0a1829;border-radius:16px;padding:18px}.orderTop{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.status{background:#133d6c;color:#9bd0ff;border-radius:20px;padding:7px 12px;font-weight:800}.sum{font-size:20px;font-weight:900;color:#63b4ff}.items{margin-top:12px;color:#b7c5d6}.open{margin-top:12px;border:1px solid #2c5680;background:#102846;color:#fff;border-radius:10px;padding:9px 12px;cursor:pointer}.empty{color:#9fb0c4}.error{color:#ffb4b4}@media(max-width:850px){.grid{grid-template-columns:1fr}.header{padding:0 18px}h1{font-size:30px}}</style></head><body><header class="header"><div class="logo">Vita <span>Equip</span></div><nav class="nav"><a href="/">Главная</a><a href="/catalog">Каталог</a><button onclick="logout()">Выйти</button></nav></header><main class="wrap"><h1>Личный кабинет</h1><div class="grid"><section class="card"><div class="avatar">👤</div><h2 id="name">Загрузка...</h2><div class="row"><div class="label">Логин</div><div class="value" id="login"></div></div><div class="row"><div class="label">Телефон</div><div class="value" id="phone"></div></div><div class="row"><div class="label">Email</div><div class="value" id="email"></div></div><div class="row"><div class="label">Адрес доставки</div><div class="value" id="address"></div></div></section><section class="card"><h2>Мои заказы</h2><div id="orders" class="orders"><div class="empty">Загрузка заказов...</div></div></section></div></main><script>const token=localStorage.getItem('userToken');if(!token)location.href='/login';const money=n=>Number(n||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₽';const date=s=>s?new Date(s).toLocaleDateString('ru-RU'):'—';async function api(url){const r=await fetch(url,{headers:{Authorization:'Bearer '+token}});const d=await r.json();if(!d.success)throw new Error(d.error||'Ошибка');return d.data}function logout(){localStorage.removeItem('userToken');location.href='/login'}async function load(){try{const me=await api('/api/auth/me');document.getElementById('name').textContent=me.fullName||'Пользователь';document.getElementById('login').textContent=me.login||'—';document.getElementById('phone').textContent=me.phone||'—';document.getElementById('email').textContent=me.email||'—';document.getElementById('address').textContent=me.deliveryAddress||'—';const orders=await api('/api/my/orders');const box=document.getElementById('orders');if(!orders.length){box.innerHTML='<div class="empty">Заказов пока нет.</div>';return}box.innerHTML=orders.map(o=>`<div class="order"><div class="orderTop"><div><b>Заказ №${o.ORDER_ID}</b><div class="empty">${date(o.ORDER_DATE)} · товаров: ${o.ITEMS_COUNT||0}</div></div><div class="status">${o.ORDER_STATUS||'—'}</div></div><div class="sum">${money(o.TOTAL_SUM)}</div><button class="open" onclick="loadItems(${o.ORDER_ID},this)">Показать состав заказа</button><div class="items" id="items-${o.ORDER_ID}"></div></div>`).join('')}catch(e){document.querySelector('.wrap').innerHTML='<div class="card error">'+e.message+'</div>'}}async function loadItems(id,btn){try{const items=await api('/api/my/orders/'+id+'/items');const box=document.getElementById('items-'+id);box.innerHTML=items.length?items.map(i=>`<div>• ${i.PRODUCT_NAME} — ${i.QUANTITY} шт. × ${money(i.SALE_PRICE_AT_TIME)} = ${money(i.ITEM_SUM)}</div>`).join(''):'Состав заказа пуст';btn.style.display='none'}catch(e){alert(e.message)}}load();</script></body></html>
